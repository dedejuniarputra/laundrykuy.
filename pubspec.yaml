name: laundry_kuy
description: "Laundry.kuy - Aplikasi Manajemen Laundry"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State Management
  get: ^4.6.6
  
  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.7
  google_sign_in: ^6.2.2
  
  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  
  # Utils
  intl: ^0.20.2
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon-laundry.png"
  web:
    generate: true
    image_path: "assets/icon-laundry.png"

flutter:
  uses-material-design: true

  assets:
    - assets/logo-lundrykuy.png
    - assets/icon-laundry.png
